global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # flux self-instruments via the Effect Metric module (the meta loop).
  - job_name: flux-worker
    static_configs:
      - targets: ["host.docker.internal:9464"]
