# flux dev infra — level N0 (ARCHITECTURE.md §7).
# PostgreSQL also serves as the advanced visibility store (custom search attributes, N2).
# Grafana + Tempo (OTel) arrive at level N1; demo service + nginx at N0-e2e.
name: flux

services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.7
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-ui:
    image: temporalio/ui:2.52.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Trace backend: OTLP ingest (:4318) + UI (:16686). flux exports Effect spans here.
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  # Minimal deploy target for the demo (scripts/demo.sh). whoami answers 200 on
  # any path, so the canary's health check passes and it promotes 10 -> 50 -> 100.
  # Opt-in:  docker compose --profile demo up -d demo-target
  demo-target:
    image: traefik/whoami
    profiles: ["demo"]
    ports:
      - "8088:80"

volumes:
  pgdata:
