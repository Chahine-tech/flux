packages:
  - apps/*
  - packages/*

allowBuilds:
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true

# Centralized versions — packages reference "catalog:".
# effect is pinned EXACT (very active beta, deliberate upgrades only — see ARCHITECTURE.md §9).
catalog:
  effect: 4.0.0-beta.97
  "@effect/platform-node": 4.0.0-beta.97
  "@effect/sql-sqlite-node": 4.0.0-beta.97
  "@effect/vitest": 4.0.0-beta.97
  "@effect/opentelemetry": 4.0.0-beta.97
  "@temporalio/activity": ^1.20.2
  "@temporalio/client": ^1.20.2
  "@temporalio/common": ^1.20.2
  "@temporalio/testing": ^1.20.2
  "@temporalio/worker": ^1.20.2
  "@temporalio/workflow": ^1.20.2
  "@types/node": ^24.13.3
  typescript: ^7.0.2
  tsx: ^4.19.0
  vitest: ^4.1.10

minimumReleaseAgeExclude:
  - rolldown-plugin-dts@0.27.8
  - tsdown@0.22.7

# historyToJSON (used by the D22 replay-fixture capture) only works with
# proto3-json-serializer 2.0.0: 2.0.1+ throws on bytes map values before the
# SDK can fix them up — documented in @temporalio/common's own proto-utils
# (googleapis/proto3-json-serializer-nodejs#103). Scoped to the one package
# that needs it; remove once the Temporal SDK pins or fixes this itself.
overrides:
  "@temporalio/common>proto3-json-serializer": 2.0.0